<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=5, user-scalable=yes">
  <meta name="description" content="👉 MINI GAME 방명록 바로가기 | 하트를 모아 점수를 높이고, 구덩이는 피하세요!">
  <meta property="og:type" content="website">
  <meta property="og:title" content="창균과 소현의 결혼식을 도와주세요! 💍">
  <meta property="og:description" content="👉 MINI GAME 방명록 바로가기 | 하트를 모아 점수를 높이고, 구덩이는 피하세요!">
  <meta property="og:image" content="https://leesohyunee.github.io/wedding-run-poodle/assets/thumbnail.png">
  <meta property="og:url" content="https://leesohyunee.github.io/wedding-run-poodle/">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:image" content="https://leesohyunee.github.io/wedding-run-poodle/assets/thumbnail.png">
  <title>창균과 소현의 결혼식을 도와주세요! 💍</title>
  <link rel="icon" href="assets/favicon.png" type="image/png">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="app-frame">
    <img src="assets/header.gif" alt="" class="app-bg">

    <!-- ========== MAIN PAGE ========== -->
    <div id="page-main" class="page active">
      <div class="page-body main-body">
        <div class="back-btn-area">
          <a href="https://changkyun-and-sohyun.figma.site/" class="back-img-link" id="back-main">
            <img src="assets/back-btn.png" alt="돌아가기" class="back-btn-img">
          </a>
        </div>
        <div class="main-center">
          <img src="assets/speech-bubble.png" alt="창균과 소현의 결혼식을 도와주세요!" class="speech-bubble-img">
          <div class="couple-img-wrap">
            <img src="assets/character-main.gif" alt="couple" class="couple-img">
          </div>
        </div>
        <div class="main-buttons">
          <button class="btn-main btn-start" id="btn-start">START</button>
          <button class="btn-main btn-rank" id="btn-leaderboard">RANK</button>
        </div>
      </div>
    </div>

    <!-- ========== GAME PAGE ========== -->
    <div id="page-game" class="page">
      <div class="game-top-bar">
        <a href="#" class="back-img-link" id="back-game">
          <img src="assets/back-btn.png" alt="돌아가기" class="back-btn-img">
        </a>
        <span class="score-text">SCORE : <span id="hud-score">0</span></span>
      </div>
      <div class="canvas-wrap">
        <canvas id="game-canvas"></canvas>
        <img id="game-char-img" src="assets/character.gif" alt="" class="char-overlay">
      </div>
      <div class="game-controls" aria-label="이동">
        <button type="button" class="ctrl-square ctrl-square-up" id="ctrl-up" aria-label="위 레인">↑</button>
        <button type="button" class="ctrl-square ctrl-square-down" id="ctrl-down" aria-label="아래 레인">↓</button>
      </div>
    </div>

    <!-- ========== GAME OVER OVERLAY ========== -->
    <div id="overlay-gameover" class="overlay hidden">
      <div class="gameover-card">
        <div class="gameover-top">
          <h2>GAME OVER <span class="star-deco">✦</span></h2>
          <div class="gameover-score">
            YOUR SCORE : <span id="final-score-value" class="score-num">0</span>
          </div>
        </div>
        <div class="gameover-form-card">
          <form id="score-form" autocomplete="off">
            <div class="field">
              <label>이름 / 닉네임</label>
              <input type="text" id="input-nickname" placeholder="(5글자 이내)" maxlength="5" required>
            </div>
            <div class="field">
              <label>신랑측 or 신부측</label>
              <div class="select-wrapper">
                <select id="input-team" required>
                  <option value="" disabled selected>선택</option>
                  <option value="groom">신랑측</option>
                  <option value="bride">신부측</option>
                </select>
              </div>
            </div>
            <div class="field">
              <label>짧은 메시지</label>
              <input type="text" id="input-message" placeholder="(30자 이내)" maxlength="30">
            </div>
            <button type="submit" class="btn-game btn-submit">SUBMIT</button>
          </form>
        </div>
        <button type="button" class="btn-go-back" id="btn-skip-submit">GO BACK</button>
      </div>
    </div>

    <div id="modal-leave-confirm" class="modal-overlay hidden" role="dialog" aria-modal="true" aria-labelledby="modal-leave-title">
      <div class="modal-card">
        <p id="modal-leave-title" class="modal-leave-msg">저장하지 않고 나가겠습니까?</p>
        <div class="modal-leave-actions">
          <button type="button" class="btn-modal btn-modal-save" id="modal-btn-save">SAVE</button>
          <button type="button" class="btn-modal btn-modal-leave" id="modal-btn-leave">LEAVE</button>
        </div>
      </div>
    </div>

    <!-- ========== LEADERBOARD PAGE ========== -->
    <div id="page-leader" class="page">
      <div class="page-body leader-body">
        <div class="back-btn-area">
          <a href="./" class="back-img-link" id="back-leader">
            <img src="assets/back-btn.png" alt="돌아가기" class="back-btn-img">
          </a>
        </div>
        <div class="rank-spacer"></div>
        <div class="rank-header-row">
          <img src="assets/rank-title.png" alt="RANK" class="rank-title-img">
          <div class="rank-couple-wrap">
            <img src="assets/couple-rank.gif" alt="couple" class="couple-rank-img">
          </div>
        </div>
        <div class="rank-col-header">
          <span class="col-name">NAME</span>
          <span class="col-msg">MESSAGE</span>
          <span class="col-score">SCORE</span>
        </div>
        <div class="leader-list" id="leader-list"></div>
        <div class="leader-bottom">
          <button class="btn-game" id="btn-play-again">START</button>
        </div>
      </div>
    </div>

  </div>

  <script src="js/app.js"></script>
  <script src="js/game.js"></script>
</body>
</html>
